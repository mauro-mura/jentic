name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn -B clean compile
      
      - name: Run tests
        run: mvn -B test
      
      - name: Verify build
        run: mvn -B verify -DskipTests
      
      - name: Generate coverage report
        run: mvn -B org.jacoco:jacoco-maven-plugin:report
      
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "jentic-core/target/site/jacoco/index.html" ]; then
            echo "✅ Coverage reports generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage reports not found" >> $GITHUB_STEP_SUMMARY
          fi