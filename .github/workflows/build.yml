name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean compile

      - name: Run tests and coverage
        run: mvn -B verify org.jacoco:jacoco-maven-plugin:report

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            jentic-core/target/site/jacoco/
            jentic-runtime/target/site/jacoco/
            jentic-adapters/target/site/jacoco/
            jentic-tools/target/site/jacoco/
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for module in jentic-core jentic-runtime jentic-adapters jentic-tools; do
            if [ -f "$module/target/site/jacoco/index.html" ]; then
              echo "✅ $module coverage report generated" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ $module coverage report not found" >> $GITHUB_STEP_SUMMARY
            fi
          done