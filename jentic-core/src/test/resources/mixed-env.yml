jentic:
  runtime:
    name: "${RUNTIME_NAME:default-mixed-runtime}"
    environment: "${APP_ENV:development}"
    properties:
      database: "${DB_URL:jdbc:h2:mem:test}"
      apiKey: "${API_KEY:test-key-12345}"

  agents:
    autoDiscovery: true
    scanPackages:
      - "${BASE_PACKAGE:dev.jentic.examples}.agents"
      - "${BASE_PACKAGE:dev.jentic.examples}.workers"
    properties:
      timeout: "${AGENT_TIMEOUT:30s}"
      maxRetries: "${MAX_RETRIES:3}"