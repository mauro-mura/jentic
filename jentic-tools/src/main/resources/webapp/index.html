<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jentic Web Console - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Jentic Web Console</h1>
            <div class="connection-status">
                <span id="ws-status" class="status-badge disconnected">Disconnected</span>
            </div>
        </header>

        <nav>
            <a href="/" class="active">Dashboard</a>
        </nav>

        <main>
            <!-- Stats Section -->
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Total Agents</h3>
                    <div class="stat-value" id="total-agents">-</div>
                </div>
                <div class="stat-card">
                    <h3>Active Agents</h3>
                    <div class="stat-value" id="active-agents">-</div>
                </div>
                <div class="stat-card">
                    <h3>Memory Usage</h3>
                    <div class="stat-value" id="memory-usage">-</div>
                </div>
                <div class="stat-card">
                    <h3>System Health</h3>
                    <div class="stat-value" id="health-status">-</div>
                </div>
            </section>

            <!-- Agents Section -->
            <section class="agents-section">
                <div class="section-header">
                    <h2>Agents</h2>
                    <button id="refresh-btn" class="btn btn-secondary">🔄 Refresh</button>
                </div>
                
                <div id="agents-list" class="agents-list">
                    <div class="loading">Loading agents...</div>
                </div>
            </section>

            <!-- Events Section -->
            <section class="events-section">
                <div class="section-header">
                    <h2>Live Events</h2>
                    <button id="clear-events-btn" class="btn btn-secondary">Clear</button>
                </div>
                
                <div id="events-log" class="events-log">
                    <div class="event">No events yet. Connect WebSocket to see live updates.</div>
                </div>
            </section>
        </main>

        <footer>
            <p>Jentic Framework v1.0 | Phase 3: Management & Monitoring</p>
        </footer>
    </div>

    <script src="/js/websocket.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
